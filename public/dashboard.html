<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.15);
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-width: 240px;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
    }

    .sidebar-logo {
      padding: 0 16px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .sidebar-logo span {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .sidebar-section {
      padding: 4px 8px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 8px 8px 4px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .channel-item:hover { background: var(--surface-hover); }
    .channel-item.active { background: var(--accent-dim); }

    .channel-emoji {
      font-size: 16px;
      line-height: 1;
      width: 20px;
      text-align: center;
    }

    .channel-name {
      font-size: 13px;
      color: var(--text-muted);
      flex: 1;
    }
    .channel-item.active .channel-name { color: var(--text); font-weight: 500; }

    .channel-badge {
      background: var(--accent);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1px solid rgba(129,140,248,0.3);
      object-fit: cover;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 600;
    }

    .user-name {
      font-size: 12px;
      color: var(--text-muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 2px;
    }
    .logout-btn:hover { color: var(--text-muted); }

    /* ── Main chat area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .chat-header-emoji { font-size: 18px; }

    .chat-header-info { flex: 1; }
    .chat-header-name { font-size: 14px; font-weight: 600; }
    .chat-header-status { font-size: 11px; color: var(--text-dim); }

    .connection-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border-radius: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .conn-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .conn-dot.connected { background: var(--green); }
    .conn-dot.connecting { background: var(--yellow); }
    .conn-dot.error { background: var(--red); }

    /* Voice button in header */
    .voice-toggle-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .voice-toggle-btn:hover { background: var(--surface-hover); color: var(--text); }
    .voice-toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Messages ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-dim);
    }

    .empty-state .big-emoji { font-size: 48px; }
    .empty-state p { font-size: 14px; }

    /* Message rows */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 680px;
    }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.assistant { align-self: flex-start; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      border: 1px solid rgba(129,140,248,0.2);
    }

    .msg-bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 520px;
      position: relative;
    }

    .msg-row.user .msg-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-row.assistant .msg-bubble {
      background: var(--surface);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    .msg-bubble code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 4px;
      padding: 0 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .msg-row.user .msg-meta { justify-content: flex-end; }

    .tts-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s;
    }
    .tts-btn:hover { opacity: 1; }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Typing indicator */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      align-self: flex-start;
    }

    .typing-bubble {
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: typing-bounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing-bounce {
      0%,60%,100% { transform: translateY(0); background: var(--text-dim); }
      30% { transform: translateY(-6px); background: var(--accent); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 6px 8px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(129,140,248,0.4);
    }

    .message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      line-height: 1.5;
      resize: none;
      min-height: 36px;
      max-height: 120px;
      padding: 6px 8px;
    }

    .message-input::placeholder { color: var(--text-dim); }

    .input-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      background: var(--surface-hover);
      color: var(--text-muted);
      font-size: 16px;
    }

    .input-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    .input-btn.send {
      background: var(--accent);
      color: white;
    }
    .input-btn.send:disabled {
      background: var(--surface-hover);
      color: var(--text-dim);
      cursor: default;
    }

    .input-btn.mic.listening {
      background: rgba(248, 113, 113, 0.2);
      color: var(--red);
      animation: pulse-ring 1.5s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(248,113,113,0); }
    }

    /* @mention autocomplete */
    .mention-dropdown {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: #1a1a26;
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 180px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }

    .mention-item {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .mention-item:hover, .mention-item.selected { background: var(--accent-dim); }
    .mention-item .m-emoji { font-size: 16px; }
    .mention-item .m-name { color: var(--text); }

    /* ── Voice modal ── */
    .voice-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.92);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      backdrop-filter: blur(8px);
    }
    .voice-modal.visible { display: flex; }

    .voice-orb {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid rgba(129,140,248,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .voice-orb.listening {
      background: rgba(248,113,113,0.12);
      border-color: rgba(248,113,113,0.5);
      animation: orb-pulse 2s ease-in-out infinite;
    }

    .voice-orb.processing {
      animation: orb-spin 1.5s linear infinite;
    }

    .voice-orb.speaking {
      background: rgba(129,140,248,0.15);
      border-color: rgba(129,140,248,0.6);
      animation: orb-wave 1s ease-in-out infinite;
    }

    @keyframes orb-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.3); }
      50% { box-shadow: 0 0 0 20px rgba(248,113,113,0); }
    }

    @keyframes orb-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes orb-wave {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    .voice-status {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .voice-transcript {
      max-width: 420px;
      text-align: center;
      font-size: 15px;
      color: var(--text);
      min-height: 48px;
      line-height: 1.6;
    }

    .voice-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .voice-close:hover { background: var(--surface-hover); color: var(--text); }

    .voice-waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
    }

    .wf-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      transition: height 0.1s;
    }

    /* Mention tag in rendered messages */
    .mention-tag {
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 13px;
      font-weight: 500;
    }

    /* New channel button */
    .new-channel-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .new-channel-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* Channel delete button (shown on hover) */
    .channel-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 11px;
      padding: 2px 4px;
      border-radius: 4px;
      display: none;
      transition: all 0.15s;
    }
    .channel-item:hover .channel-delete { display: block; }
    .channel-delete:hover { color: var(--red); background: rgba(248,113,113,0.1); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.visible { display: flex; }

    .modal-box {
      background: #16161f;
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 360px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-row label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .form-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-input:focus { border-color: rgba(129,140,248,0.5); }
    .form-input::placeholder { color: var(--text-dim); }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: var(--surface-hover); }

    /* Mobile responsive */
    @media (max-width: 600px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span>⚡ Agent Portal</span>
  </div>

  <div class="sidebar-section" style="flex:1;overflow-y:auto;">
    <div class="sidebar-section-label" style="display:flex;align-items:center;justify-content:space-between;padding-right:4px;">
      <span>Channels</span>
      <button class="new-channel-btn" onclick="openNewChannelModal()" title="New channel">＋</button>
    </div>
    <div id="channelList">
      <!-- Populated by JS -->
      <div style="padding:8px 10px;font-size:12px;color:var(--text-dim);">Loading…</div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar" id="userAvatar">?</div>
      <span class="user-name" id="userName">Loading…</span>
      <button class="logout-btn" onclick="window.location='/auth/logout'" title="Sign out">↩</button>
    </div>
  </div>
</nav>

<!-- New channel modal -->
<div class="modal-overlay" id="newChannelModal" onclick="closeNewChannelModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span>New Channel</span>
      <button class="modal-close" onclick="closeNewChannelModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>Emoji</label>
        <input type="text" id="newChEmoji" value="💬" maxlength="2" class="form-input" style="width:60px;">
      </div>
      <div class="form-row">
        <label>Name</label>
        <input type="text" id="newChName" placeholder="e.g. Lewis, #general" class="form-input" autofocus>
      </div>
      <div class="form-row">
        <label>Session key <span style="color:var(--text-dim);font-size:11px;">(optional)</span></label>
        <input type="text" id="newChSession" placeholder="agent:main:main" class="form-input">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeNewChannelModal()">Cancel</button>
      <button class="btn-primary" onclick="createChannel()">Create</button>
    </div>
  </div>
</div>

<!-- Main chat -->
<div class="main">
  <!-- Header -->
  <div class="chat-header">
    <span class="chat-header-emoji" id="headerEmoji">🤖</span>
    <div class="chat-header-info">
      <div class="chat-header-name" id="headerName">Lewis</div>
      <div class="chat-header-status" id="headerStatus">AI assistant</div>
    </div>
    <div class="connection-pill" id="connPill">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">Connecting…</span>
    </div>
    <button class="voice-toggle-btn" id="voiceToggleBtn" title="Voice chat" onclick="openVoice()">🎙️</button>
  </div>

  <!-- Messages -->
  <div class="messages-area" id="messagesArea">
    <div class="empty-state" id="emptyState">
      <div class="big-emoji">💬</div>
      <p>Start a conversation</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-wrapper" style="position:relative;" id="inputWrapper">
      <div class="mention-dropdown" id="mentionDropdown" style="display:none;"></div>
      <textarea
        class="message-input"
        id="messageInput"
        placeholder="Message…"
        rows="1"
        onkeydown="handleInputKey(event)"
        oninput="handleInputChange(this)"
      ></textarea>
      <button class="input-btn mic" id="micBtn" title="Voice input" onclick="toggleMic()">🎤</button>
      <button class="input-btn send" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2L8 14M8 2L3 7M8 2L13 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Voice modal -->
<div class="voice-modal" id="voiceModal">
  <button class="voice-close" onclick="closeVoice()">✕</button>

  <div class="voice-orb listening" id="voiceOrb" onclick="handleOrbTap()">
    <div class="voice-waveform" id="waveform">
      <div class="wf-bar" style="height:8px"></div>
      <div class="wf-bar" style="height:16px"></div>
      <div class="wf-bar" style="height:24px"></div>
      <div class="wf-bar" style="height:12px"></div>
      <div class="wf-bar" style="height:20px"></div>
    </div>
  </div>

  <div class="voice-status" id="voiceStatus">Listening…</div>
  <div class="voice-transcript" id="voiceTranscript"></div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────

// Populated from API on load
let AGENTS = [];

// ── State ──────────────────────────────────────────────────────────────────

let ws = null;
let wsConnected = false;
let wsReconnectTimer = null;
let currentChannel = { id: null, emoji: '💬', name: '', session: 'agent:main:main' };
let messages = [];
let streamingMessageId = null;
let isWaiting = false;
let myUser = null;

// Voice state
let voiceActive = false;
let recognition = null;
let voiceState = 'idle'; // idle | listening | processing | speaking
let voiceAudio = null;
let voiceQueue = [];
let ttsProcessing = false;
let voiceResumeAt = 0;
let voiceLastSent = '';
let voiceLastSentTime = 0;

// Mention state
let mentionQuery = null;
let mentionStart = -1;
let selectedMentionIdx = 0;

// ── Init ───────────────────────────────────────────────────────────────────

async function init() {
  // Load user info
  try {
    const res = await fetch('/api/me', { credentials: 'include' });
    const user = await res.json();
    if (!user) { window.location = '/'; return; }
    myUser = user;
    const avatarEl = document.getElementById('userAvatar');
    if (user.picture) {
      const img = document.createElement('img');
      img.src = user.picture;
      img.style.cssText = 'width:28px;height:28px;border-radius:50%;object-fit:cover;';
      avatarEl.replaceWith(img);
    } else {
      avatarEl.textContent = (user.name || 'U').charAt(0).toUpperCase();
    }
    document.getElementById('userName').textContent = user.name || user.email || 'You';
  } catch (e) { console.warn('user load failed', e); }

  // Load agents list for @mention autocomplete
  try {
    const res = await fetch('/api/agents', { credentials: 'include' });
    const agents = await res.json();
    AGENTS = agents.map(a => ({ id: a.id, name: a.name, emoji: '🤖', session: 'agent:main:main' }));
  } catch (e) { console.warn('agents load failed', e); }

  // Load channels
  await loadChannels();

  connectWS();
}

// ── Channels ───────────────────────────────────────────────────────────────

let channelList = [];

async function loadChannels() {
  try {
    const res = await fetch('/api/channels', { credentials: 'include' });
    channelList = await res.json();
    renderChannelList();
    // Auto-select first channel
    if (channelList.length > 0 && !currentChannel.id) {
      selectChannelById(channelList[0].id);
    }
  } catch (e) {
    console.warn('channels load failed', e);
    document.getElementById('channelList').innerHTML =
      '<div style="padding:8px 10px;font-size:12px;color:var(--text-dim);">No channels yet</div>';
  }
}

function renderChannelList() {
  const list = document.getElementById('channelList');
  list.innerHTML = '';

  if (channelList.length === 0) {
    list.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:var(--text-dim);">No channels — create one ↑</div>';
    return;
  }

  for (const ch of channelList) {
    const item = document.createElement('div');
    item.className = 'channel-item' + (currentChannel.id === ch.id ? ' active' : '');
    item.dataset.channelId = ch.id;
    item.onclick = () => selectChannelById(ch.id);

    const emoji = document.createElement('span');
    emoji.className = 'channel-emoji';
    emoji.textContent = ch.emoji || '💬';

    const name = document.createElement('span');
    name.className = 'channel-name';
    name.textContent = ch.name;

    const del = document.createElement('button');
    del.className = 'channel-delete';
    del.title = 'Delete channel';
    del.textContent = '✕';
    del.onclick = (e) => { e.stopPropagation(); deleteChannel(ch.id); };

    item.appendChild(emoji);
    item.appendChild(name);
    if (!ch.is_default) item.appendChild(del);

    list.appendChild(item);
  }
}

function selectChannelById(id) {
  const ch = channelList.find(c => c.id === id);
  if (!ch) return;

  currentChannel = {
    id: ch.id,
    emoji: ch.emoji || '💬',
    name: ch.name,
    session: ch.session_key || 'agent:main:main',
  };

  document.getElementById('headerEmoji').textContent = currentChannel.emoji;
  document.getElementById('headerName').textContent = currentChannel.name;
  document.getElementById('headerStatus').textContent = 'AI assistant';

  renderChannelList(); // re-render to update active state
  messages = [];
  renderAllMessages();
  if (wsConnected) loadHistory();
}

async function deleteChannel(id) {
  if (!confirm('Delete this channel?')) return;
  try {
    await fetch('/api/channels/' + id, { method: 'DELETE', credentials: 'include' });
    channelList = channelList.filter(c => c.id !== id);
    if (currentChannel.id === id && channelList.length > 0) {
      selectChannelById(channelList[0].id);
    }
    renderChannelList();
  } catch (e) { console.error('delete channel failed', e); }
}

function openNewChannelModal() {
  document.getElementById('newChannelModal').classList.add('visible');
  document.getElementById('newChName').focus();
}

function closeNewChannelModal(event) {
  if (event && event.target !== document.getElementById('newChannelModal')) return;
  document.getElementById('newChannelModal').classList.remove('visible');
  document.getElementById('newChName').value = '';
  document.getElementById('newChSession').value = '';
  document.getElementById('newChEmoji').value = '💬';
}

async function createChannel() {
  const name = document.getElementById('newChName').value.trim();
  const emoji = document.getElementById('newChEmoji').value.trim() || '💬';
  const session_key = document.getElementById('newChSession').value.trim() || 'agent:main:main';

  if (!name) { document.getElementById('newChName').focus(); return; }

  try {
    const res = await fetch('/api/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ name, emoji, session_key }),
    });
    const ch = await res.json();
    if (!res.ok) throw new Error(ch.error || 'Create failed');
    channelList.push(ch);
    closeNewChannelModal();
    selectChannelById(ch.id);
  } catch (e) {
    console.error('create channel failed', e);
    alert('Failed to create channel: ' + e.message);
  }
}

// Allow Enter key in modal name field to submit
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('newChName').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') createChannel();
  });
});

// ── WebSocket ──────────────────────────────────────────────────────────────

async function connectWS() {
  try {
    const cfgRes = await fetch('/api/chat-config', { credentials: 'include' });
    const cfg = await cfgRes.json();
    openWS(cfg.gatewayWsUrl);
  } catch (e) {
    console.error('[ws] config fetch failed', e);
    scheduleReconnect();
  }
}

function openWS(url) {
  setConnStatus('connecting');
  if (ws) { try { ws.close(); } catch(e){} }

  ws = new WebSocket(url);

  ws.onopen = () => {
    wsConnected = true;
    setConnStatus('connected');
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = null;
    loadHistory();
  };

  ws.onmessage = (ev) => {
    try { handleWsMessage(JSON.parse(ev.data)); } catch(e) {}
  };

  ws.onclose = () => {
    wsConnected = false;
    setConnStatus('disconnected');
    scheduleReconnect();
  };

  ws.onerror = () => {
    wsConnected = false;
    setConnStatus('error');
  };
}

function scheduleReconnect() {
  if (wsReconnectTimer) return;
  wsReconnectTimer = setTimeout(() => { wsReconnectTimer = null; connectWS(); }, 3000);
}

function handleWsMessage(msg) {
  // History response
  if (msg.type === 'res' && msg.id && msg.id.startsWith('hist-') && msg.result) {
    const history = msg.result.messages || msg.result;
    if (Array.isArray(history)) renderHistory(history);
    return;
  }

  const event = msg.event || msg.type;
  const payload = msg.payload || msg.data || msg;

  if (event === 'stream_delta') {
    const delta = payload.delta || payload.text || '';
    const sessionKey = payload.sessionKey || payload.session_key || '';
    if (!sessionKey || sessionKey === currentChannel.session) {
      handleStreamDelta(delta);
    }
    return;
  }

  if (event === 'stream_end' || (msg.type === 'event' && payload.state === 'final')) {
    handleStreamEnd();
    return;
  }

  if (event === 'chat.message' || event === 'chat.event' ||
      (msg.type === 'event' && (payload.state === 'streaming' || payload.state === 'final' || payload.state === 'error'))) {
    handleChatEvent(payload, msg);
    return;
  }

  if (event === 'proxy.connected') {
    setConnStatus('connected');
    loadHistory();
    return;
  }
}

function handleStreamDelta(delta) {
  if (!delta) return;
  hideEmptyState();
  isWaiting = false;
  hideTypingIndicator();

  if (streamingMessageId) {
    appendToMessage(streamingMessageId, delta);
  } else {
    streamingMessageId = 'msg-' + Date.now();
    const msgData = {
      id: streamingMessageId,
      role: 'assistant',
      text: delta,
      timestamp: new Date(),
      streaming: true,
    };
    messages.push(msgData);
    renderMessage(msgData);
  }
  scrollToBottom();

  // Feed streaming text to voice TTS if in voice mode
  if (voiceActive && voiceState === 'processing') {
    feedVoiceTTS(delta);
  }
}

function handleStreamEnd() {
  if (streamingMessageId) {
    const el = document.getElementById(streamingMessageId);
    if (el) {
      const cursor = el.querySelector('.cursor-blink');
      if (cursor) cursor.remove();
    }
    const msg = messages.find(m => m.id === streamingMessageId);
    if (msg) msg.streaming = false;
    streamingMessageId = null;
  }
  isWaiting = false;
  hideTypingIndicator();

  if (voiceActive) flushVoiceTTS();

  // Refresh history after a short delay
  setTimeout(loadHistory, 2500);
}

function handleChatEvent(payload, raw) {
  const state = payload.state || '';
  const sessionKey = payload.sessionKey || '';
  if (sessionKey && sessionKey !== currentChannel.session) return;

  if (state === 'streaming') {
    const text = extractText(payload.message);
    if (text) {
      hideEmptyState();
      if (streamingMessageId) {
        appendToMessage(streamingMessageId, text);
      } else {
        streamingMessageId = 'msg-' + Date.now();
        const msgData = { id: streamingMessageId, role: 'assistant', text, timestamp: new Date(), streaming: true };
        messages.push(msgData);
        renderMessage(msgData);
      }
      scrollToBottom();
    }
    isWaiting = true;
  } else if (state === 'final') {
    handleStreamEnd();
  } else if (state === 'error') {
    isWaiting = false;
    hideTypingIndicator();
    streamingMessageId = null;
  }
}

function extractText(content) {
  if (!content) return '';
  if (typeof content === 'string') return content;
  if (Array.isArray(content)) {
    return content.filter(p => p.type === 'text').map(p => p.text).join('\n');
  }
  if (typeof content === 'object' && content.content) return extractText(content.content);
  return '';
}

// ── History ────────────────────────────────────────────────────────────────

function loadHistory() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const reqId = 'hist-' + Date.now();
  ws.send(JSON.stringify({
    type: 'req', id: reqId,
    method: 'chat.history',
    params: { sessionKey: currentChannel.session, limit: 30 },
  }));
}

function renderHistory(history) {
  const normalized = history
    .reverse ? history.reverse() : history;

  // Don't replace while streaming
  if (streamingMessageId) return;

  const incoming = normalized
    .filter(m => {
      const role = m.role;
      if (role === 'system') return false;
      const text = extractMsgText(m);
      return text && text.trim().length > 0;
    })
    .map(m => ({
      id: m.id || ('h-' + Math.random()),
      role: m.role,
      text: extractMsgText(m),
      timestamp: m.timestamp ? new Date(m.timestamp) : new Date(),
      streaming: false,
    }));

  messages = incoming;
  renderAllMessages();
}

function extractMsgText(m) {
  if (typeof m.text === 'string') return m.text;
  if (typeof m.content === 'string') return m.content;
  if (Array.isArray(m.content)) {
    return m.content.filter(p => p && p.type === 'text').map(p => p.text).join('\n');
  }
  return '';
}

// ── Rendering ──────────────────────────────────────────────────────────────

function renderAllMessages() {
  const area = document.getElementById('messagesArea');
  // Preserve typing indicator if visible
  const typing = document.getElementById('typingRow');
  area.innerHTML = '';

  if (messages.length === 0) {
    area.innerHTML = '<div class="empty-state" id="emptyState"><div class="big-emoji">💬</div><p>Start a conversation</p></div>';
    return;
  }

  for (const msg of messages) {
    const el = buildMessageEl(msg);
    area.appendChild(el);
  }

  if (typing) area.appendChild(typing);
  scrollToBottom(false);
}

function renderMessage(msg) {
  hideEmptyState();
  const el = buildMessageEl(msg);
  const area = document.getElementById('messagesArea');
  // Insert before typing indicator if it exists
  const typing = document.getElementById('typingRow');
  if (typing) area.insertBefore(el, typing);
  else area.appendChild(el);
  scrollToBottom();
}

function buildMessageEl(msg) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + msg.role;
  row.id = msg.id;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';

  if (msg.role === 'assistant') {
    avatar.textContent = currentChannel.emoji;
  } else {
    if (myUser && myUser.picture) {
      const img = document.createElement('img');
      img.src = myUser.picture;
      img.style.cssText = 'width:28px;height:28px;border-radius:50%;object-fit:cover;';
      avatar.appendChild(img);
    } else {
      avatar.textContent = myUser ? (myUser.name || 'U').charAt(0) : 'U';
    }
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.dataset.fullText = msg.text;

  const textEl = document.createElement('span');
  textEl.className = 'msg-text';
  textEl.innerHTML = renderInlineMarkdown(renderMentions(msg.text));
  bubble.appendChild(textEl);

  if (msg.streaming) {
    const cursor = document.createElement('span');
    cursor.className = 'cursor-blink';
    bubble.appendChild(cursor);
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  meta.textContent = formatTimestamp(msg.timestamp);

  if (msg.role === 'assistant' && !msg.streaming) {
    const ttsBtn = document.createElement('button');
    ttsBtn.className = 'tts-btn';
    ttsBtn.title = 'Read aloud';
    ttsBtn.textContent = '🔊';
    ttsBtn.onclick = () => playTTS(msg.id, msg.text, ttsBtn);
    meta.appendChild(ttsBtn);
  }

  const col = document.createElement('div');
  col.style.cssText = 'display:flex;flex-direction:column;gap:4px;max-width:520px;';
  col.appendChild(bubble);
  col.appendChild(meta);

  if (msg.role === 'assistant') {
    row.appendChild(avatar);
    row.appendChild(col);
  } else {
    row.appendChild(col);
    row.appendChild(avatar);
  }

  return row;
}

function appendToMessage(id, delta) {
  const row = document.getElementById(id);
  if (!row) return;
  const textEl = row.querySelector('.msg-text');
  if (!textEl) return;

  const msg = messages.find(m => m.id === id);
  if (msg) {
    msg.text += delta;
    textEl.innerHTML = renderInlineMarkdown(renderMentions(msg.text));
    // Re-add cursor if streaming
    const bubble = row.querySelector('.msg-bubble');
    if (msg.streaming && bubble && !bubble.querySelector('.cursor-blink')) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor-blink';
      bubble.appendChild(cursor);
    }
    bubble.dataset.fullText = msg.text;
  }
  scrollToBottom();
}

function renderMentions(text) {
  return text.replace(/@(\w+)/g, '<span class="mention-tag">@$1</span>');
}

function renderInlineMarkdown(text) {
  // Bold, italic, code (inline only — safe subset)
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function formatTimestamp(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function hideEmptyState() {
  const el = document.getElementById('emptyState');
  if (el) el.remove();
}

function scrollToBottom(animated = true) {
  const area = document.getElementById('messagesArea');
  if (animated) {
    area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' });
  } else {
    area.scrollTop = area.scrollHeight;
  }
}

// Typing indicator
function showTypingIndicator() {
  if (document.getElementById('typingRow')) return;
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = currentChannel.emoji;

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

  row.appendChild(avatar);
  row.appendChild(bubble);
  document.getElementById('messagesArea').appendChild(row);
  scrollToBottom();
}

function hideTypingIndicator() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

// ── Send message ──────────────────────────────────────────────────────────

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text || !wsConnected) return;

  input.value = '';
  autoResizeInput(input);
  updateSendBtn();

  // Add user message locally
  const msgId = 'u-' + Date.now();
  const msgData = { id: msgId, role: 'user', text, timestamp: new Date(), streaming: false };
  messages.push(msgData);
  hideEmptyState();
  renderMessage(msgData);

  isWaiting = true;
  showTypingIndicator();

  // Send over WebSocket
  try {
    ws.send(JSON.stringify({
      type: 'req',
      id: 'send-' + Date.now(),
      method: 'chat.send',
      params: { sessionKey: currentChannel.session, message: text },
    }));
  } catch (e) {
    console.error('[send] failed', e);
    isWaiting = false;
    hideTypingIndicator();
  }
}

// ── Input handling ────────────────────────────────────────────────────────

function handleInputKey(e) {
  // Mention dropdown navigation
  if (mentionQuery !== null) {
    const items = getFilteredMentions();
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedMentionIdx = (selectedMentionIdx + 1) % items.length;
      renderMentionDropdown(items);
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedMentionIdx = (selectedMentionIdx - 1 + items.length) % items.length;
      renderMentionDropdown(items);
      return;
    }
    if (e.key === 'Tab' || e.key === 'Enter') {
      e.preventDefault();
      if (items[selectedMentionIdx]) insertMention(items[selectedMentionIdx]);
      return;
    }
    if (e.key === 'Escape') {
      closeMentionDropdown();
      return;
    }
  }

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
    return;
  }
}

function handleInputChange(el) {
  autoResizeInput(el);
  updateSendBtn();
  detectMention(el);
}

function autoResizeInput(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateSendBtn() {
  const input = document.getElementById('messageInput');
  const btn = document.getElementById('sendBtn');
  btn.disabled = !input.value.trim() || !wsConnected;
}

// ── @mention autocomplete ─────────────────────────────────────────────────

function detectMention(el) {
  const val = el.value;
  const pos = el.selectionStart;
  const before = val.slice(0, pos);
  const atMatch = before.match(/@(\w*)$/);

  if (atMatch) {
    mentionQuery = atMatch[1];
    mentionStart = before.lastIndexOf('@');
    selectedMentionIdx = 0;
    const items = getFilteredMentions();
    if (items.length > 0) {
      renderMentionDropdown(items);
    } else {
      closeMentionDropdown();
    }
  } else {
    closeMentionDropdown();
  }
}

function getFilteredMentions() {
  if (mentionQuery === null) return [];
  const q = mentionQuery.toLowerCase();
  return AGENTS.filter(a => a.name.toLowerCase().startsWith(q));
}

function renderMentionDropdown(items) {
  const dd = document.getElementById('mentionDropdown');
  dd.innerHTML = '';
  dd.style.display = 'block';
  items.forEach((item, idx) => {
    const el = document.createElement('div');
    el.className = 'mention-item' + (idx === selectedMentionIdx ? ' selected' : '');
    el.innerHTML = `<span class="m-emoji">${item.emoji}</span><span class="m-name">${item.name}</span>`;
    el.onclick = () => insertMention(item);
    dd.appendChild(el);
  });
}

function closeMentionDropdown() {
  mentionQuery = null;
  mentionStart = -1;
  document.getElementById('mentionDropdown').style.display = 'none';
}

function insertMention(agent) {
  const input = document.getElementById('messageInput');
  const val = input.value;
  const pos = input.selectionStart;
  const newVal = val.slice(0, mentionStart) + '@' + agent.name + ' ' + val.slice(pos);
  input.value = newVal;
  const newPos = mentionStart + agent.name.length + 2;
  input.setSelectionRange(newPos, newPos);
  closeMentionDropdown();
  updateSendBtn();
}

// ── Mic (speech-to-text input) ────────────────────────────────────────────

function toggleMic() {
  const btn = document.getElementById('micBtn');
  if (!recognition) {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Speech recognition not supported in this browser');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';

    recognition.onresult = (e) => {
      const input = document.getElementById('messageInput');
      let transcript = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      input.value = transcript;
      autoResizeInput(input);
      updateSendBtn();
      if (e.results[e.resultIndex].isFinal) {
        btn.classList.remove('listening');
        sendMessage();
        recognition = null;
      }
    };

    recognition.onerror = () => { btn.classList.remove('listening'); recognition = null; };
    recognition.onend = () => { btn.classList.remove('listening'); };
  }

  if (btn.classList.contains('listening')) {
    recognition.stop();
    btn.classList.remove('listening');
  } else {
    recognition.start();
    btn.classList.add('listening');
  }
}

// switchChannel alias kept for any stale inline references
function switchChannel(el) { /* replaced by selectChannelById */ }

// ── Connection status ─────────────────────────────────────────────────────

function setConnStatus(status) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  dot.className = 'conn-dot';

  switch (status) {
    case 'connected':
      dot.classList.add('connected');
      label.textContent = 'Connected';
      updateSendBtn();
      break;
    case 'connecting':
      dot.classList.add('connecting');
      label.textContent = 'Connecting…';
      break;
    case 'disconnected':
      label.textContent = 'Disconnected';
      updateSendBtn();
      break;
    case 'error':
      dot.classList.add('error');
      label.textContent = 'Error';
      updateSendBtn();
      break;
  }
}

// ── TTS (tap-to-speak on messages) ────────────────────────────────────────

async function playTTS(msgId, text, btn) {
  if (!text || !text.trim()) return;
  btn.textContent = '⏳';
  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ text: text.slice(0, 5000) }),
    });
    if (!res.ok) throw new Error('TTS failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    btn.textContent = '⏹️';
    audio.play();
    audio.onended = () => { btn.textContent = '🔊'; URL.revokeObjectURL(url); };
    btn.onclick = () => { audio.pause(); btn.textContent = '🔊'; btn.onclick = () => playTTS(msgId, text, btn); };
  } catch (e) {
    console.error('[tts]', e);
    btn.textContent = '🔊';
  }
}

// ── Voice mode ─────────────────────────────────────────────────────────────

let voiceTTSBuffer = '';
let voiceTTSQueue = [];
let voiceTTSPlaying = false;
let voiceTTSAudio = null;
const SENTENCE_RE = /[^.!?…]+[.!?…]+\s*/g;

function openVoice() {
  const modal = document.getElementById('voiceModal');
  modal.classList.add('visible');
  voiceActive = true;
  voiceTTSBuffer = '';
  voiceTTSQueue = [];
  voiceTTSPlaying = false;
  startVoiceListening();
}

function closeVoice() {
  const modal = document.getElementById('voiceModal');
  modal.classList.remove('visible');
  voiceActive = false;
  stopVoiceListening();
  if (voiceTTSAudio) { voiceTTSAudio.pause(); voiceTTSAudio = null; }
  voiceTTSBuffer = '';
  voiceTTSQueue = [];
  voiceTTSPlaying = false;
  setVoiceState('idle');
}

function handleOrbTap() {
  if (voiceState === 'listening') {
    setVoiceState('idle');
    stopVoiceListening();
  } else if (voiceState === 'speaking') {
    // Interrupt — go back to listening
    if (voiceTTSAudio) { voiceTTSAudio.pause(); voiceTTSAudio = null; }
    voiceTTSQueue = [];
    voiceTTSPlaying = false;
    setVoiceState('listening');
    voiceResumeAt = Date.now();
    startVoiceListening();
  } else if (voiceState === 'idle') {
    setVoiceState('listening');
    startVoiceListening();
  }
}

function setVoiceState(state) {
  voiceState = state;
  const orb = document.getElementById('voiceOrb');
  const statusEl = document.getElementById('voiceStatus');
  orb.className = 'voice-orb ' + state;

  const statusMap = {
    idle: '—',
    listening: 'Listening…',
    processing: 'Thinking…',
    speaking: 'Speaking…',
  };
  statusEl.textContent = statusMap[state] || '';
}

function startVoiceListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = 'en-US';
  recognition = r;

  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('voiceTranscript').textContent = interim || final;
    if (final) handleVoiceFinal(final.trim());
  };

  r.onerror = (e) => { if (e.error !== 'no-speech') setVoiceState('idle'); };
  r.onend = () => {
    if (voiceState === 'listening') {
      // auto-restart
      setTimeout(() => { if (voiceState === 'listening') startVoiceListening(); }, 300);
    }
  };

  r.start();
  setVoiceState('listening');
}

function stopVoiceListening() {
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
}

function handleVoiceFinal(text) {
  if (!text || text.length < 3) return;
  const now = Date.now();
  // Post-TTS cooldown
  if (now - voiceResumeAt < 1200) return;
  // Dedup
  if (text === voiceLastSent && now - voiceLastSentTime < 30000) return;

  voiceLastSent = text;
  voiceLastSentTime = now;
  voiceTTSBuffer = '';
  voiceTTSQueue = [];
  voiceTTSPlaying = false;

  document.getElementById('voiceTranscript').textContent = text;

  stopVoiceListening();
  setVoiceState('processing');

  if (!wsConnected) return;
  ws.send(JSON.stringify({
    type: 'req',
    id: 'voice-' + Date.now(),
    method: 'chat.send',
    params: { sessionKey: currentChannel.session, message: text },
  }));
}

// Called per-delta during streaming — buffer and chunk TTS
function feedVoiceTTS(delta) {
  if (!voiceActive) return;
  voiceTTSBuffer += delta;

  // Extract complete sentences
  let match;
  const re = /[^.!?…]+[.!?…]+\s*/g;
  let lastIdx = 0;
  while ((match = re.exec(voiceTTSBuffer)) !== null) {
    voiceTTSQueue.push(match[0].trim());
    lastIdx = re.lastIndex;
  }
  if (lastIdx > 0) voiceTTSBuffer = voiceTTSBuffer.slice(lastIdx);

  if (!voiceTTSPlaying) playNextVoiceChunk();
}

// Called when stream ends — flush remaining buffer
function flushVoiceTTS() {
  if (!voiceActive) return;
  if (voiceTTSBuffer.trim()) {
    voiceTTSQueue.push(voiceTTSBuffer.trim());
    voiceTTSBuffer = '';
  }
  if (!voiceTTSPlaying) playNextVoiceChunk();
}

async function playNextVoiceChunk() {
  if (!voiceActive || voiceTTSQueue.length === 0) {
    voiceTTSPlaying = false;
    if (voiceActive && voiceState === 'speaking') {
      // Done speaking — resume listening
      setVoiceState('listening');
      voiceResumeAt = Date.now();
      startVoiceListening();
    }
    return;
  }

  voiceTTSPlaying = true;
  setVoiceState('speaking');
  const text = voiceTTSQueue.shift();

  try {
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ text: text.slice(0, 5000) }),
    });

    if (!res.ok) throw new Error('TTS chunk failed');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    voiceTTSAudio = audio;

    audio.onended = () => {
      URL.revokeObjectURL(url);
      voiceTTSAudio = null;
      playNextVoiceChunk();
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      voiceTTSAudio = null;
      playNextVoiceChunk();
    };

    audio.play().catch(e => { console.warn('[voice tts]', e); playNextVoiceChunk(); });
  } catch (e) {
    console.warn('[voice tts chunk]', e);
    voiceTTSPlaying = false;
    playNextVoiceChunk();
  }
}
