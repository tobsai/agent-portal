<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Portal — Work</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='0' y='0' width='100' height='100' fill='%23312e81' rx='15'/%3E%3Ctext x='50%25' y='60%25' font-family='sans-serif' font-size='60' fill='%23818cf8' text-anchor='middle' dominant-baseline='middle'%3EAP%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e4e4e7;
      --text-muted: #71717a;
      --text-dim: #52525b;
      --accent: #818cf8;
      --accent-dim: rgba(129,140,248,0.15);
      --green: #34d399;
      --yellow: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Top Nav ─── */
    .top-nav {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.95);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      object-fit: cover;
    }

    .nav-sep { color: var(--text-dim); font-size: 0.8rem; }

    .nav-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .nav-conn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .nav-conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.2s;
    }

    .nav-conn.live .nav-conn-dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }

    .nav-conn.live { color: var(--text-muted); }

    .btn-sm {
      font-size: 0.75rem;
      padding: 0.3rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }

    .btn-sm:hover { background: var(--surface-hover); color: var(--text); }
    .btn-sm.primary {
      background: var(--accent-dim);
      border-color: rgba(129,140,248,0.3);
      color: var(--accent);
    }
    .btn-sm.primary:hover { background: rgba(129,140,248,0.25); }

    /* ─── Layout ─── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ─── Page Header ─── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      grid-column: 1 / -1;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .page-header p {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    /* ─── Stats row ─── */
    .stats-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      grid-column: 1 / -1;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      min-width: 80px;
    }

    .stat-chip span {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      display: block;
    }

    /* ─── Status Badges ─── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.5rem;
      border-radius: 5px;
    }

    .badge-active    { background: rgba(96,165,250,0.15); color: var(--blue); border: 1px solid rgba(96,165,250,0.25); }
    .badge-complete  { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
    .badge-blocked   { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
    .badge-planned   { background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-paused    { background: rgba(251,191,36,0.1); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
    .badge-in-progress { background: rgba(129,140,248,0.15); color: var(--accent); border: 1px solid rgba(129,140,248,0.25); }
    .badge-backlog   { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-done      { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
    .badge-cancelled { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); text-decoration: line-through; }

    .priority-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .p1 { background: var(--red); }
    .p2 { background: var(--yellow); }
    .p3 { background: var(--text-dim); }

    /* ─── Initiative Cards ─── */
    .initiative-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .initiative-card:hover { border-color: rgba(255,255,255,0.14); }

    .initiative-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem;
      cursor: pointer;
      user-select: none;
    }

    .initiative-toggle {
      font-size: 0.7rem;
      color: var(--text-dim);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .initiative-card.open .initiative-toggle { transform: rotate(90deg); }

    .initiative-title {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
    }

    .initiative-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .initiative-owner {
      font-size: 0.72rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ─── Tasks Table ─── */
    .tasks-section {
      display: none;
      border-top: 1px solid var(--border);
      padding: 0.5rem 0;
    }

    .initiative-card.open .tasks-section { display: block; }

    .tasks-table {
      width: 100%;
      border-collapse: collapse;
    }

    .tasks-table th {
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.4rem 1.25rem;
      text-align: left;
    }

    .tasks-table td {
      padding: 0.55rem 1.25rem;
      font-size: 0.84rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .task-title { color: var(--text-muted); font-weight: 500; }
    .task-owner { color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; }
    .task-age { color: var(--text-dim); font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

    .tasks-table tr:hover td { background: rgba(255,255,255,0.02); }

    .empty-tasks {
      padding: 1rem 1.25rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ─── Empty State ─── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-state .icon { font-size: 3rem; opacity: 0.25; margin-bottom: 1rem; }
    .empty-state h2 { font-size: 1.1rem; font-weight: 600; color: var(--text-muted); }
    .empty-state p { font-size: 0.85rem; color: var(--text-dim); margin-top: 0.5rem; line-height: 1.5; }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .error-msg {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--red);
      font-size: 0.82rem;
      margin-bottom: 1.5rem;
    }

    /* ─── Signals Panel ─── */
    .signals-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      height: fit-content;
      max-height: calc(100vh - 120px);
      position: sticky;
      top: 64px;
    }

    .signals-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .signals-header h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .signals-live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.3s;
    }

    .signals-live-dot.live {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .signals-list {
      overflow-y: auto;
      flex: 1;
      padding: 0.5rem 0;
      min-height: 200px;
    }

    .signals-list::-webkit-scrollbar { width: 4px; }
    .signals-list::-webkit-scrollbar-track { background: transparent; }
    .signals-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .signal-item {
      display: flex;
      gap: 0.6rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: background 0.1s;
    }

    .signal-item:hover { background: rgba(255,255,255,0.02); }

    .signal-item.new {
      animation: flashIn 0.4s ease-out;
    }

    @keyframes flashIn {
      0% { background: rgba(129,140,248,0.12); }
      100% { background: transparent; }
    }

    .signal-icon {
      font-size: 0.85rem;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .signal-body { flex: 1; min-width: 0; }

    .signal-msg {
      font-size: 0.8rem;
      color: var(--text-muted);
      line-height: 1.4;
      word-break: break-word;
    }

    .signal-meta {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.2rem;
      font-size: 0.68rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    .signal-level-info    { color: var(--text-dim); }
    .signal-level-success { color: var(--green); }
    .signal-level-warning { color: var(--yellow); }
    .signal-level-error   { color: var(--red); }
    .signal-level-progress { color: var(--accent); }

    .signal-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    .signals-footer {
      padding: 0.5rem 1rem;
      border-top: 1px solid var(--border);
      font-size: 0.68rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ─── Sub-Agent Summary Widget ─── */
    .subagent-widget {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      grid-column: 1 / -1;
      margin-bottom: 0;
    }

    .subagent-widget-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .subagent-widget-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .subagent-widget-title .live-badge {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(52,211,153,0.1);
      color: var(--green);
      border: 1px solid rgba(52,211,153,0.2);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }

    .subagent-widget-link {
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.15s;
    }

    .subagent-widget-link:hover { opacity: 1; }

    .subagent-rows {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .subagent-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      background: rgba(255,255,255,0.02);
      font-size: 0.78rem;
    }

    .sa-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sa-dot.active   { background: var(--blue); box-shadow: 0 0 5px var(--blue); animation: pulse 2s infinite; }
    .sa-dot.done     { background: var(--green); }
    .sa-dot.complete { background: var(--green); }
    .sa-dot.error    { background: var(--red); }
    .sa-dot.unknown  { background: var(--text-dim); }

    .sa-label {
      font-weight: 500;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sa-status {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .sa-status.active   { background: rgba(96,165,250,0.15); color: var(--blue); }
    .sa-status.done     { background: rgba(52,211,153,0.12); color: var(--green); }
    .sa-status.complete { background: rgba(52,211,153,0.12); color: var(--green); }
    .sa-status.error    { background: rgba(248,113,113,0.12); color: var(--red); }
    .sa-status.unknown  { background: rgba(255,255,255,0.05); color: var(--text-dim); }

    .sa-meta {
      font-size: 0.67rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }

    .subagent-empty {
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
      padding: 0.75rem 0;
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <a href="/chat" class="nav-logo">
      <img src="/assets/support-agent-avatar.png" alt="Agent Portal">
      Agent Portal
    </a>
    <span class="nav-sep">/</span>
    <span class="nav-title">Work</span>
    <div class="nav-right">
      <div class="nav-conn" id="nav-conn">
        <span class="nav-conn-dot"></span>
        <span id="nav-conn-text">Connecting</span>
      </div>
      <a href="/subagents" class="btn-sm">Sub-Agents</a>
      <a href="/chat" class="btn-sm">Chat</a>
    </div>
  </nav>

  <div class="layout">
    <!-- Page Header -->
    <div class="page-header">
      <div>
        <h1>Work Tracking</h1>
        <p>Initiatives, tasks, and live agent signals.</p>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats-area" style="grid-column:1/-1;"></div>
    <div id="error-area" style="grid-column:1/-1;"></div>

    <!-- Sub-Agent Summary Widget -->
    <div class="subagent-widget" id="subagent-widget">
      <div class="subagent-widget-header">
        <div class="subagent-widget-title">
          🤖 Sub-Agent Activity
          <span class="live-badge" id="sa-live-badge" style="display:none">live</span>
        </div>
        <a href="/subagents" class="subagent-widget-link">Full tree →</a>
      </div>
      <div class="subagent-rows" id="subagent-rows">
        <div class="subagent-empty">Loading…</div>
      </div>
    </div>

    <!-- Main: Initiatives + Tasks -->
    <div id="work-area"><div class="loading">Loading…</div></div>

    <!-- Right: Live Signals -->
    <div class="signals-panel">
      <div class="signals-header">
        <h2>Live Signals</h2>
        <span class="signals-live-dot" id="signals-dot"></span>
      </div>
      <div class="signals-list" id="signals-list">
        <div class="signal-empty">Waiting for agent signals…</div>
      </div>
      <div class="signals-footer" id="signals-footer">No signals yet</div>
    </div>
  </div>

  <script>
    // ─── Utilities ─────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function timeAgo(dateStr) {
      if (!dateStr) return '';
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 2) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function statusBadge(status) {
      const map = {
        active: 'badge-active', 'in-progress': 'badge-in-progress',
        complete: 'badge-complete', blocked: 'badge-blocked',
        planned: 'badge-planned', paused: 'badge-paused',
        backlog: 'badge-backlog', done: 'badge-done', cancelled: 'badge-cancelled',
      };
      const cls = map[status] || 'badge-planned';
      return `<span class="badge ${cls}">${escHtml(status?.replace(/-/g,' ') ?? 'unknown')}</span>`;
    }

    function priorityDot(priority) {
      if (!priority) return '';
      return `<span class="priority-dot ${priority.toLowerCase()}" title="${priority}"></span>`;
    }

    function signalIcon(level) {
      return { info: '💬', success: '✅', warning: '⚠️', error: '🔴', progress: '⏳' }[level] || '•';
    }

    // ─── State ─────────────────────────────────────────────────────────────
    let signalCount = 0;
    const MAX_SIGNALS = 80;

    // ─── Signals rendering ─────────────────────────────────────────────────
    function renderSignal(sig, isNew = false) {
      const list = document.getElementById('signals-list');

      // Remove empty placeholder
      const empty = list.querySelector('.signal-empty');
      if (empty) empty.remove();

      const item = document.createElement('div');
      item.className = 'signal-item' + (isNew ? ' new' : '');
      item.innerHTML = `
        <span class="signal-icon">${signalIcon(sig.level)}</span>
        <div class="signal-body">
          <div class="signal-msg signal-level-${escHtml(sig.level || 'info')}">${escHtml(sig.message)}</div>
          <div class="signal-meta">
            ${sig.agent_id ? `<span>${escHtml(sig.agent_id.slice(0,8))}</span>` : ''}
            ${sig.session_key ? `<span>${escHtml(sig.session_key.slice(0,12))}…</span>` : ''}
            <span>${timeAgo(sig.created_at)}</span>
          </div>
        </div>`;

      if (isNew) {
        list.insertBefore(item, list.firstChild);
        // Trim old signals
        while (list.children.length > MAX_SIGNALS) {
          list.removeChild(list.lastChild);
        }
      } else {
        list.appendChild(item);
      }

      signalCount++;
      document.getElementById('signals-footer').textContent =
        `${signalCount} signal${signalCount !== 1 ? 's' : ''} — refreshes live`;
    }

    function loadSignals(signals) {
      const list = document.getElementById('signals-list');
      list.innerHTML = '';
      if (!signals || signals.length === 0) {
        list.innerHTML = '<div class="signal-empty">No signals yet. Agents will push updates here.</div>';
        return;
      }
      // signals are already sorted newest-first from API
      signals.slice(0, MAX_SIGNALS).forEach(s => renderSignal(s, false));
    }

    // ─── Initiatives + Tasks rendering ─────────────────────────────────────
    function renderTasks(tasks) {
      if (!tasks || tasks.length === 0) {
        return '<div class="empty-tasks">No tasks yet.</div>';
      }
      const rows = tasks.map(t => `
        <tr style="cursor:pointer" onclick="posthog.capture('work_item_clicked',{task_id:'${escHtml(t.id||'')}',title:${JSON.stringify(t.title||'')},status:'${escHtml(t.status||'')}'})">
          <td class="task-title">${escHtml(t.title || '—')}</td>
          <td>${statusBadge(t.status || 'backlog')}</td>
          <td class="task-owner">${escHtml(t.assigned_to || '—')}</td>
          <td class="task-age">${timeAgo(t.created_at)}</td>
        </tr>`).join('');
      return `
        <table class="tasks-table">
          <thead><tr><th>Task</th><th>Status</th><th>Owner</th><th>Age</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderInitiatives(initiatives, tasks) {
      const area = document.getElementById('work-area');
      if (!initiatives || initiatives.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="icon">📋</div>
            <h2>No initiatives yet</h2>
            <p>Initiatives and tasks will appear here as agents track work.<br>
               POST to <code>/api/work</code> with <code>{ type: "initiative", title: "…" }</code>.</p>
          </div>`;
        return;
      }

      const html = initiatives.map(ini => {
        const iniTasks = tasks.filter(t => t.initiative_id === ini.id);
        return `
          <div class="initiative-card open">
            <div class="initiative-header" onclick="this.parentElement.classList.toggle('open')">
              <span class="initiative-toggle">▶</span>
              <span class="initiative-title">${escHtml(ini.title)}</span>
              <div class="initiative-meta">
                ${ini.priority ? `${priorityDot(ini.priority)} <small style="font-size:0.72rem;color:var(--text-dim)">${ini.priority}</small>` : ''}
                ${statusBadge(ini.status || 'planned')}
                ${ini.owner ? `<span class="initiative-owner">${escHtml(ini.owner)}</span>` : ''}
              </div>
            </div>
            <div class="tasks-section">${renderTasks(iniTasks)}</div>
          </div>`;
      }).join('');

      const orphans = tasks.filter(t => !t.initiative_id);
      const orphanHtml = orphans.length > 0 ? `
        <div class="initiative-card open">
          <div class="initiative-header" onclick="this.parentElement.classList.toggle('open')">
            <span class="initiative-toggle">▶</span>
            <span class="initiative-title" style="color:var(--text-dim)">Unassigned Tasks</span>
            <div class="initiative-meta">${statusBadge('backlog')}</div>
          </div>
          <div class="tasks-section">${renderTasks(orphans)}</div>
        </div>` : '';

      area.innerHTML = html + orphanHtml;
    }

    function renderStats(initiatives, tasks, signals) {
      const active = initiatives.filter(i => i.status === 'active').length;
      const inProg = tasks.filter(t => t.status === 'in-progress' || t.status === 'active').length;
      const done = tasks.filter(t => t.status === 'done' || t.status === 'complete').length;
      document.getElementById('stats-area').innerHTML = `
        <div class="stats-row">
          <div class="stat-chip"><span>${initiatives.length}</span>Initiatives</div>
          <div class="stat-chip"><span>${active}</span>Active</div>
          <div class="stat-chip"><span>${tasks.length}</span>Tasks</div>
          <div class="stat-chip"><span>${inProg}</span>In Progress</div>
          <div class="stat-chip"><span>${done}</span>Done</div>
          <div class="stat-chip"><span>${signals.length}</span>Signals</div>
        </div>`;
    }

    // ─── Data load ─────────────────────────────────────────────────────────
    async function load() {
      try {
        const res = await fetch('/api/work');
        if (res.status === 401) { window.location.href = '/auth/google'; return; }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const initiatives = data.initiatives || [];
        const tasks = data.tasks || [];
        const signals = data.signals || [];
        renderStats(initiatives, tasks, signals);
        renderInitiatives(initiatives, tasks);
        loadSignals(signals);
      } catch (err) {
        document.getElementById('error-area').innerHTML =
          `<div class="error-msg">Failed to load work data: ${escHtml(err.message)}</div>`;
        document.getElementById('work-area').innerHTML = '';
      }
    }

    // ─── WebSocket for live updates ─────────────────────────────────────────
    let ws = null;
    let wsReconnectTimer = null;

    function setNavConn(state) {
      const el = document.getElementById('nav-conn');
      const txt = document.getElementById('nav-conn-text');
      const dot = document.getElementById('signals-dot');
      el.className = 'nav-conn' + (state === 'live' ? ' live' : '');
      txt.textContent = state === 'live' ? 'Live' : state === 'reconnecting' ? 'Reconnecting…' : 'Connecting…';
      dot.className = 'signals-live-dot' + (state === 'live' ? ' live' : '');
    }

    function connectWs() {
      if (ws) return;
      const url = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;
      ws = new WebSocket(url);

      ws.onopen = () => {
        setNavConn('live');
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
      };

      ws.onmessage = (evt) => {
        let msg;
        try { msg = JSON.parse(evt.data); } catch { return; }

        if (msg.event === 'work:signal') {
          renderSignal(msg.data, true);
        } else if (msg.event === 'work:task:created' || msg.event === 'work:task:updated' ||
                   msg.event === 'work:initiative:created' || msg.event === 'work:initiative:updated') {
          // Reload full state on structural changes
          load();
        }
      };

      ws.onclose = () => {
        ws = null;
        setNavConn('reconnecting');
        wsReconnectTimer = setTimeout(connectWs, 3000);
      };

      ws.onerror = () => { ws?.close(); };
    }

    // ─── Sub-Agent Widget ───────────────────────────────────────────────────
    function formatRuntime(ms) {
      if (!ms && ms !== 0) return '';
      const secs = Math.floor(ms / 1000);
      if (secs < 60) return `${secs}s`;
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m`;
      return `${Math.floor(mins / 60)}h ${mins % 60}m`;
    }

    function flattenTree(nodes, result = []) {
      for (const n of nodes) {
        result.push(n);
        if (n.children && n.children.length) flattenTree(n.children, result);
      }
      return result;
    }

    async function loadSubAgentWidget() {
      try {
        const res = await fetch('/api/subagents');
        if (!res.ok) return;
        const data = await res.json();
        const all = flattenTree(data.tree || []);

        const rowsEl = document.getElementById('subagent-rows');
        const liveBadge = document.getElementById('sa-live-badge');

        // Show live badge if any active agents
        const hasActive = all.some(a => a.status === 'active');
        liveBadge.style.display = hasActive ? '' : 'none';

        if (!all.length) {
          rowsEl.innerHTML = '<div class="subagent-empty">No sub-agent activity yet.</div>';
          return;
        }

        // Show most recent 5, newest first (sorted by startedAt desc)
        const sorted = [...all].sort((a, b) =>
          new Date(b.startedAt || 0) - new Date(a.startedAt || 0)
        ).slice(0, 5);

        rowsEl.innerHTML = sorted.map(agent => {
          const label = agent.label || agent.id.slice(0, 24);
          const st = agent.status || 'unknown';
          const runtime = agent.runtime ? formatRuntime(agent.runtime) : '';
          const depthPrefix = agent.depth > 0
            ? `<span style="color:var(--text-dim);font-size:0.65rem;margin-right:2px">${'↳'.repeat(Math.min(agent.depth, 3))}</span>`
            : '';
          return `
            <div class="subagent-row">
              <span class="sa-dot ${escHtml(st)}"></span>
              ${depthPrefix}<span class="sa-label" title="${escHtml(agent.id)}">${escHtml(label)}</span>
              <span class="sa-status ${escHtml(st)}">${escHtml(st)}</span>
              ${runtime ? `<span class="sa-meta">${escHtml(runtime)}</span>` : ''}
            </div>`;
        }).join('');
      } catch (_) {
        // silently fail — widget is supplemental
      }
    }
